<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级照片留言墙（多人共享版）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial}
  body{background:#f4f6f8;padding:20px;max-width:1000px;margin:0 auto;position:relative;padding-bottom:120px}

  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 4px;flex-wrap:wrap;gap:10px}
  .identity-area{display:flex;align-items:center;gap:8px}
  .identity-label{font-size:14px;color:#666}
  .identity-input{padding:8px 10px;border:1px solid #e1e4e8;border-radius:6px;font-size:13px;width:180px}
  .admin-area{display:flex;align-items:center;gap:8px}
  .admin-pwd-input{padding:8px 10px;border:1px solid #e1e4e8;border-radius:6px;font-size:13px;width:120px}
  .admin-btn{padding:8px 12px;border:none;border-radius:6px;background:#ff4d4f;color:white;font-size:13px;cursor:pointer}
  .admin-tips{font-size:12px;color:#999}

  .log-box{margin:10px 0;padding:10px;border-radius:8px;background:#f8f9fa;border:1px solid #e1e4e8;font-size:12px;color:#333;min-height:60px;max-height:150px;overflow-y:auto}
  .log-success{color:#67c23a}
  .log-error{color:#f56c6c}
  .log-info{color:#409eff}

  .header{text-align:center;margin-bottom:20px}
  .header h1{font-size:24px;color:#222}
  .header p{color:#666;margin-top:6px}

  .album-wrap{margin-bottom:20px}
  .album-title{font-size:16px;color:#333;margin-bottom:12px;font-weight:500;padding-left:4px}
  .album-scroll{display:flex;overflow-x:auto;gap:16px;padding:4px 0;scrollbar-width:thin}
  .album-card{width:110px;flex-shrink:0;cursor:pointer;transition:all 0.2s;text-align:center}
  .album-card:hover{transform:scale(1.05)}
  .album-cover{width:110px;height:110px;border-radius:14px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:6px;border:2px solid transparent}
  .album-card.active .album-cover{border-color:#409eff}
  .album-name{font-size:13px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}

  .album-photos{display:flex;flex-wrap:wrap;gap:12px;padding:10px 0;margin-bottom:20px}
  .album-photo{width:110px;height:110px;border-radius:14px;object-fit:cover;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:all 0.2s}
  .album-photo:hover{transform:scale(1.05)}
  .photo-empty{width:100%;text-align:center;padding:20px;color:#999;font-size:14px}

  .photo-viewer{background:white;border-radius:16px;overflow:hidden;box-shadow:0 3px 15px rgba(0,0,0,0.07);margin-bottom:20px;padding:10px;display:none}
  .photo-viewer img{width:100%;max-height:500px;object-fit:contain;border-radius:8px}
  .hot-comment{padding:14px 18px;background:#e8f3ff;border-left:4px solid #409eff;margin:10px 18px;border-radius:8px}
  .hot-comment h4{color:#409eff;font-size:14px;margin-bottom:4px}
  .hot-comment .text{font-size:15px;color:#222}
  .hot-comment .name{font-size:12px;color:#666;margin-top:4px}
  .photo-op-bar{padding:0 18px;margin:10px 0;display:flex;justify-content:flex-end}
  .photo-del-btn{background:#ff4d4f;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer}
  .comment-area{padding:18px}
  .comment-input{width:100%;padding:12px 14px;border:1px solid #e1e4e8;border-radius:12px;margin-bottom:12px;font-size:14px}
  .comment-submit{padding:8px 16px;border:none;border-radius:6px;background:#409eff;color:white;font-size:13px;cursor:pointer;margin-bottom:12px}
  .comment-list{max-height:250px;overflow-y:auto}
  .comment{padding:10px 0;border-bottom:1px solid #f0f2f5;position:relative}
  .comment .name{color:#409eff;font-weight:500}
  .comment .time{font-size:12px;color:#999;margin-left:8px}
  .comment .text{margin-top:4px;font-size:14px}
  .del-cmt{position:absolute;right:0;top:6px;background:#ff4d4f;color:white;border:none;border-radius:4px;font-size:12px;padding:2px 6px;cursor:pointer}

  .upload-wrap{position:fixed;bottom:0;left:0;width:100%;background:white;border-top:1px solid #e1e4e8;box-shadow:0 -1px 4px rgba(0,0,0,0.03);z-index:99;padding:10px 12px}
  .upload-toggle{width:100%;padding:8px;border:1px solid #409eff;border-radius:6px;background:white;color:#409eff;cursor:pointer;font-size:13px;text-align:center;margin-bottom:8px}
  .upload-content{display:none;gap:8px;flex-wrap:wrap;align-items:center}
  .upload-content.show{display:flex}
  .album-control{flex:1;min-width:200px;display:flex;gap:6px}
  .album-select-mini{flex:1;padding:8px;border:1px solid #e1e4e8;border-radius:6px;font-size:13px}
  .create-album-mini{padding:8px 12px;border:none;border-radius:6px;background:#409eff;color:white;font-size:12px;cursor:pointer}
  .file-wrap{flex:1;min-width:200px;position:relative}
  .file-input-mini{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
  .file-text{display:block;padding:8px 12px;border:1px solid #e1e4e8;border-radius:6px;font-size:13px;color:#666;background:white}
  .upload-btn-mini{flex:none;padding:8px 20px;border:none;border-radius:6px;background:#409eff;color:white;font-size:13px;cursor:pointer}

  .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center;display:none}
  .modal-content{background:white;border-radius:12px;padding:20px;width:90%;max-width:300px}
  .modal-title{font-size:16px;margin-bottom:15px;text-align:center}
  .modal-input{width:100%;padding:8px;border:1px solid #e1e4e8;border-radius:6px;margin-bottom:15px;font-size:14px}
  .modal-btn-group{display:flex;gap:10px}
  .modal-btn{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer}
  .modal-btn.confirm{background:#409eff;color:white}
  .modal-btn.cancel{background:#f5f5f5;color:#666}
</style>
</head>
<body>

<div class="top-bar">
  <div class="identity-area">
    <span class="identity-label">你的身份：</span>
    <input type="text" id="commentIdentity" class="identity-input" placeholder="输入昵称（评论用）">
  </div>
  <div class="admin-area">
    <input type="password" id="adminPwd" class="admin-pwd-input" placeholder="管理员密码">
    <button class="admin-btn" onclick="verifyAdmin()">验证</button>
    <span class="admin-tips" id="adminStatus">未验证</span>
  </div>
</div>

<div class="log-box" id="uploadLog">
  [系统] 正在连接服务器...
</div>

<div class="header">
  <h1>📷 班级照片留言墙（多人共享版）</h1>
  <p>所有人上传的照片/评论都能共享</p>
</div>

<div class="album-wrap">
  <div class="album-title">👥 人物专辑栏</div>
  <div class="album-scroll" id="albumScroll"></div>
</div>

<div class="album-photos" id="albumPhotos">
  <div class="photo-empty">请先选择上方的人物专辑～</div>
</div>

<div class="photo-viewer" id="viewer">
  <img id="bigImg" src="">
  <div id="hotArea"></div>
  <div class="photo-op-bar" id="photoOpBar">
    <button class="photo-del-btn" onclick="deletePhoto()">🗑️ 删除照片</button>
  </div>
  <div class="comment-area">
    <input class="comment-input" id="msgInput" placeholder="说点什么...">
    <button class="comment-submit" onclick="sendComment()">提交评论</button>
    <div class="comment-list" id="commentList"></div>
  </div>
</div>

<div class="modal" id="createAlbumModal">
  <div class="modal-content">
    <div class="modal-title">创建新专辑</div>
    <input type="text" id="albumNameInput" class="modal-input" placeholder="输入专辑名称（如：三年级二班）">
    <div class="modal-btn-group">
      <button class="modal-btn confirm" onclick="confirmCreateAlbum()">确定</button>
      <button class="modal-btn cancel" onclick="closeCreateAlbumModal()">取消</button>
    </div>
  </div>
</div>

<div class="upload-wrap">
  <button class="upload-toggle" onclick="toggleUpload()">
    📤 上传照片
  </button>
  
  <div class="upload-content" id="uploadContent">
    <div class="album-control">
      <select id="albumSelect" class="album-select-mini">
        <option value="">请选择专辑</option>
      </select>
      <button class="create-album-mini" onclick="openCreateAlbumModal()">新建</button>
    </div>
    
    <div class="file-wrap">
      <span class="file-text" id="fileText">📁 选择照片文件</span>
      <input id="uploadFile" type="file" accept="image/*" class="file-input-mini" onchange="updateFileText()">
    </div>
    
    <button class="upload-btn-mini" onclick="uploadPhoto()">上传</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let currentAlbumId = '';
let currentPhotoId = '';
let isAdminVerified = false;

function log(message, type = 'info') {
  const logBox = document.getElementById('uploadLog');
  const time = new Date().toLocaleTimeString();
  const className = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-info';
  const logHtml = `<div class="${className}">[${time}] ${message}</div>`;
  logBox.innerHTML = logHtml + logBox.innerHTML.split('<div').slice(0, 10).join('<div');
}

async function request(url, options = {}) {
  try {
    const response = await fetch(`${API_BASE}${url}`, {
      headers: { 'Content-Type': 'application/json', ...options.headers },
      ...options
    });
    return await response.json();
  } catch (err) {
    log(`网络错误：${err.message}`, 'error');
    return { code: 500, msg: '网络错误' };
  }
}

async function verifyAdmin() {
  const pwd = document.getElementById('adminPwd').value;
  const res = await request('/api/verify-admin', {
    method: 'POST', body: JSON.stringify({ pwd })
  });
  if (res.code === 200) {
    isAdminVerified = true;
    document.getElementById('adminStatus').innerText = '已验证';
    document.getElementById('adminStatus').style.color = '#67c23a';
    log('管理员验证成功', 'success');
  } else {
    isAdminVerified = false;
    document.getElementById('adminStatus').innerText = '验证失败';
    document.getElementById('adminStatus').style.color = '#f56c6c';
    log(res.msg, 'error');
  }
}

function toggleUpload() {
  const content = document.getElementById('uploadContent');
  content.classList.toggle('show');
  if (content.classList.contains('show')) {
    setTimeout(loadAlbums, 100);
  }
}

function updateFileText() {
  const fileInput = document.getElementById('uploadFile');
  const fileText = document.getElementById('fileText');
  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    fileText.innerText = `📁 ${file.name} (${(file.size/1024).toFixed(1)}KB)`;
  } else {
    fileText.innerText = '📁 选择照片文件';
  }
}

async function loadAlbums() {
  const res = await request('/api/albums');
  if (res.code === 200) {
    renderAlbums(res.data);
    updateAlbumSelect(res.data);
  }
}

function renderAlbums(albums) {
  const albumScroll = document.getElementById('albumScroll');
  if (albums.length === 0) {
    albumScroll.innerHTML = '<div class="photo-empty">暂无专辑</div>';
    return;
  }
  albumScroll.innerHTML = albums.map(album => `
    <div class="album-card ${album.id === currentAlbumId ? 'active' : ''}" onclick="selectAlbum('${album.id}')">
      <img class="album-cover" src="${album.coverUrl || 'data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"110\" height=\"110\" viewBox=\"0 0 24 24\" fill=\"%23e8f3ff\"><path d=\"M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z\"/></svg>'}">
      <div class="album-name">${album.name}</div>
    </div>
  `).join('');
}

function updateAlbumSelect(albums) {
  const albumSelect = document.getElementById('albumSelect');
  albumSelect.innerHTML = '<option value="">请选择专辑</option>';
  albums.forEach(album => {
    const opt = document.createElement('option');
    opt.value = album.id;
    opt.innerText = album.name;
    albumSelect.appendChild(opt);
  });
}

async function selectAlbum(albumId) {
  currentAlbumId = albumId;
  await loadAlbums();
  await loadPhotos(albumId);
}

async function loadPhotos(albumId) {
  const res = await request(`/api/photos/${albumId}`);
  const albumPhotos = document.getElementById('albumPhotos');
  if (res.code === 200 && res.data.length > 0) {
    albumPhotos.innerHTML = res.data.map(photo => `
      <img class="album-photo" src="${API_BASE}${photo.url}" onclick="openPhoto('${photo.id}')">
    `).join('');
  } else {
    albumPhotos.innerHTML = '<div class="photo-empty">该专辑暂无照片</div>';
  }
}

async function openPhoto(photoId) {
  currentPhotoId = photoId;
  const res = await request(`/api/comments/${photoId}`);
  const comments = res.data || [];
  const albumRes = await request(`/api/photos/${currentAlbumId}`);
  const photo = albumRes.data.find(p => p.id === photoId);
  
  document.getElementById('viewer').style.display = 'block';
  document.getElementById('bigImg').src = API_BASE + photo.url;
  
  const hotArea = document.getElementById('hotArea');
  if (comments.length > 0) {
    const c = comments[0];
    hotArea.innerHTML = `
      <div class="hot-comment">
        <h4>💬 最新留言</h4>
        <div class="text">${c.text}</div>
        <div class="name">${c.nick || '匿名'}</div>
      </div>
    `;
  } else {
    hotArea.innerHTML = '<div class="hot-comment"><h4>💬 暂无留言</h4></div>';
  }
  
  const commentList = document.getElementById('commentList');
  commentList.innerHTML = comments.map((c, i) => `
    <div class="comment">
      <span class="name">${c.nick || '匿名'}</span>
      <div class="text">${c.text}</div>
      ${isAdminVerified ? `<button class="del-cmt" onclick="deleteComment('${c.id}')">删</button>` : ''}
    </div>
  `).join('');
  
  document.getElementById('photoOpBar').style.display = isAdminVerified ? 'flex' : 'none';
}

function openCreateAlbumModal() { document.getElementById('createAlbumModal').style.display = 'flex'; }
function closeCreateAlbumModal() { document.getElementById('createAlbumModal').style.display = 'none'; }

async function confirmCreateAlbum() {
  const name = document.getElementById('albumNameInput').value.trim();
  if (!name) return;
  const res = await request('/api/albums', {
    method: 'POST', body: JSON.stringify({ name })
  });
  if (res.code === 200) {
    closeCreateAlbumModal();
    await loadAlbums();
  }
}

async function uploadPhoto() {
  const albumId = document.getElementById('albumSelect').value;
  const fileInput = document.getElementById('uploadFile');
  if (!albumId || !fileInput.files.length) {
    log('请选择专辑和照片', 'error');
    return;
  }
  const formData = new FormData();
  formData.append('photo', fileInput.files[0]);
  formData.append('albumId', albumId);
  
  const res = await fetch(`${API_BASE}/api/photos`, { method: 'POST', body: formData });
  const data = await res.json();
  if (data.code === 200) {
    log('上传成功', 'success');
    await loadAlbums();
    await loadPhotos(albumId);
    document.getElementById('uploadContent').classList.remove('show');
    fileInput.value = '';
    document.getElementById('fileText').innerText = '📁 选择照片文件';
  } else {
    log(data.msg, 'error');
  }
}

async function deletePhoto() {
  if (!isAdminVerified) return;
  const pwd = document.getElementById('adminPwd').value;
  await request(`/api/photos/${currentPhotoId}?pwd=${pwd}`, { method: 'DELETE' });
  document.getElementById('viewer').style.display = 'none';
  await loadPhotos(currentAlbumId);
}

async function sendComment() {
  const text = document.getElementById('msgInput').value.trim();
  const nick = document.getElementById('commentIdentity').value.trim() || '匿名';
  if (!text || !currentPhotoId) return;
  await request('/api/comments', {
    method: 'POST', body: JSON.stringify({ photoId: currentPhotoId, nick, text })
  });
  await openPhoto(currentPhotoId);
  document.getElementById('msgInput').value = '';
}

async function deleteComment(commentId) {
  if (!isAdminVerified) return;
  const pwd = document.getElementById('adminPwd').value;
  await request(`/api/comments/${commentId}?pwd=${pwd}`, { method: 'DELETE' });
  await openPhoto(currentPhotoId);
}

window.onload = loadAlbums;
</script>
</body>
</html>
