<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>班级照片留言墙</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e8eef7;
      --muted: #8b9bb4;
      --accent: #5b9cf5;
      --danger: #e85d5d;
      --ok: #3ecf8e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    button, .btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover, .btn:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.danger { border-color: var(--danger); color: var(--danger); }
    main { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 61px); }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 1rem;
      background: #121a24;
    }
    .album-list { list-style: none; padding: 0; margin: 0; }
    .album-list li {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 0.35rem;
      border: 1px solid transparent;
    }
    .album-list li:hover { background: var(--panel); }
    .album-list li.active { border-color: var(--accent); background: var(--panel); }
    .album-cover {
      width: 40px; height: 40px; border-radius: 6px; object-fit: cover;
      vertical-align: middle; margin-right: 0.5rem; background: var(--border);
    }
    section.content { padding: 1rem 1.25rem; }
    .photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .photo-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--panel);
    }
    .photo-card img {
      width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    }
    .photo-card .del {
      position: absolute; top: 6px; right: 6px;
      padding: 2px 8px; font-size: 0.75rem;
    }
    .log {
      margin-top: 1rem; padding: 0.75rem;
      border-radius: 8px; background: var(--panel);
      border: 1px solid var(--border);
      font-size: 0.85rem; color: var(--muted);
      min-height: 2.5rem;
    }
    .log.error { color: #ffb4b4; border-color: #5c2d2d; }
    .log.success { color: #a8f5cf; border-color: #1f4d3a; }
    .panel-box {
      margin-top: 1rem; padding: 1rem;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
    .panel-box h3 { margin: 0 0 0.75rem; font-size: 1rem; }
    input, textarea, select {
      width: 100%; max-width: 420px;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    textarea { min-height: 72px; resize: vertical; }
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 50;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 480px; width: 100%;
      padding: 1.25rem;
    }
    .modal h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    .comments { margin-top: 0.75rem; max-height: 220px; overflow-y: auto; }
    .comment {
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .comment .nick { color: var(--accent); font-weight: 600; }
    .empty { color: var(--muted); padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>班级照片留言墙</h1>
    <div class="toolbar">
      <button type="button" id="btnAdmin">管理员</button>
      <button type="button" class="primary" id="btnNewAlbum">新建专辑</button>
    </div>
  </header>
  <main>
    <aside>
      <p style="margin:0 0 .5rem;color:var(--muted);font-size:.85rem;">专辑列表</p>
      <ul class="album-list" id="albumList"></ul>
    </aside>
    <section class="content">
      <div class="toolbar" style="margin-bottom:1rem;">
        <button type="button" class="primary" id="btnUpload" disabled>上传照片</button>
        <span id="currentAlbumLabel" style="color:var(--muted);font-size:.9rem;"></span>
      </div>
      <div id="uploadPanel" class="panel-box" style="display:none;">
        <h3>上传照片</h3>
        <input type="file" id="uploadFile" accept="image/jpeg,image/png,image/gif,image/webp" />
        <div style="margin-top:.5rem;">
          <button type="button" class="primary" id="btnDoUpload">开始上传</button>
          <button type="button" id="btnCancelUpload">取消</button>
        </div>
      </div>
      <div class="photos" id="photoGrid"></div>
      <div class="log" id="logBox">选择左侧专辑后可浏览照片与留言。</div>
    </section>
  </main>

  <div class="modal-bg" id="modalAlbum">
    <div class="modal">
      <h2>新建专辑</h2>
      <input type="text" id="newAlbumName" placeholder="专辑名称" maxlength="40" />
      <div>
        <button type="button" class="primary" id="btnCreateAlbum">创建</button>
        <button type="button" id="btnCloseAlbum">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modalAdmin">
    <div class="modal">
      <h2>管理员验证</h2>
      <input type="password" id="adminPwd" placeholder="管理员密码" />
      <div style="margin-top:.75rem;">
        <button type="button" class="primary" id="btnVerifyAdmin">验证</button>
        <button type="button" id="btnCloseAdmin">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modalPhoto">
    <div class="modal" style="max-width:520px;">
      <h2>照片与留言</h2>
      <img id="modalImg" alt="" style="width:100%;max-height:280px;object-fit:contain;border-radius:8px;background:#000;" />
      <div class="comments" id="commentList"></div>
      <input type="text" id="commentNick" placeholder="昵称（可选）" maxlength="20" />
      <textarea id="commentText" placeholder="留言内容" maxlength="500"></textarea>
      <div>
        <button type="button" class="primary" id="btnPostComment">发表留言</button>
        <button type="button" class="danger" id="btnDeletePhoto" style="display:none;">删除照片</button>
        <button type="button" id="btnClosePhoto">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let currentAlbumId = null;
    let currentPhotoId = null;
    let isAdmin = false;

    const logBox = document.getElementById('logBox');
    function log(msg, type) {
      logBox.textContent = msg;
      logBox.className = 'log' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
    }

    async function fetchJson(url, opts) {
      const res = await fetch(API_BASE + url, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok && data.msg === undefined && data.code === undefined) {
        throw new Error('HTTP ' + res.status);
      }
      return data;
    }

    async function loadAlbums() {
      const data = await fetchJson('/api/albums');
      if (data.code !== 200) throw new Error(data.msg || '加载专辑失败');
      const ul = document.getElementById('albumList');
      ul.innerHTML = '';
      (data.data || []).forEach((a) => {
        const li = document.createElement('li');
        li.dataset.id = a.id;
        const cover = a.coverUrl
          ? `<img class="album-cover" src="${API_BASE}${a.coverUrl}" alt="" />`
          : '<span class="album-cover" style="display:inline-block;"></span>';
        li.innerHTML = cover + `<span>${escapeHtml(a.name)}</span>`;
        li.addEventListener('click', () => selectAlbum(a.id, a.name));
        ul.appendChild(li);
      });
      highlightAlbum();
    }

    function highlightAlbum() {
      document.querySelectorAll('.album-list li').forEach((li) => {
        li.classList.toggle('active', li.dataset.id === currentAlbumId);
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function selectAlbum(id, name) {
      currentAlbumId = id;
      document.getElementById('currentAlbumLabel').textContent = name ? '当前：' + name : '';
      document.getElementById('btnUpload').disabled = !id;
      highlightAlbum();
      await loadPhotos(id);
    }

    async function loadPhotos(albumId) {
      const data = await fetchJson('/api/photos/' + encodeURIComponent(albumId));
      if (data.code !== 200) throw new Error(data.msg || '加载照片失败');
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      const photos = data.data || [];
      if (!photos.length) {
        grid.innerHTML = '<div class="empty">暂无照片，点击上传照片</div>';
        return;
      }
      photos.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.dataset.id = p.id;
        const img = document.createElement('img');
        img.src = API_BASE + p.url;
        img.alt = '';
        card.appendChild(img);
        if (isAdmin) {
          const del = document.createElement('button');
          del.className = 'del danger';
          del.type = 'button';
          del.textContent = '删';
          del.addEventListener('click', (e) => {
            e.stopPropagation();
            deletePhoto(p.id);
          });
          card.appendChild(del);
        }
        card.addEventListener('click', () => openPhotoModal(p));
        grid.appendChild(card);
      });
    }

    async function deletePhoto(photoId) {
      const pwd = prompt('输入管理员密码以删除照片：');
      if (!pwd) return;
      const res = await fetchJson(
        '/api/photos/' + encodeURIComponent(photoId) + '?pwd=' + encodeURIComponent(pwd),
        { method: 'DELETE' }
      );
      if (res.code === 200) {
        log('已删除', 'success');
        await loadPhotos(currentAlbumId);
        document.getElementById('modalPhoto').classList.remove('show');
      } else {
        log(res.msg || '删除失败', 'error');
      }
    }

    async function openPhotoModal(photo) {
      currentPhotoId = photo.id;
      document.getElementById('modalImg').src = API_BASE + photo.url;
      document.getElementById('modalPhoto').classList.add('show');
      document.getElementById('btnDeletePhoto').style.display = isAdmin ? 'inline-block' : 'none';
      await loadComments(photo.id);
    }

    async function loadComments(photoId) {
      const data = await fetchJson('/api/comments/' + encodeURIComponent(photoId));
      if (data.code !== 200) {
        document.getElementById('commentList').innerHTML = '<div class="comment">加载失败</div>';
        return;
      }
      const list = document.getElementById('commentList');
      const items = data.data || [];
      if (!items.length) {
        list.innerHTML = '<div class="comment" style="color:var(--muted)">暂无留言</div>';
        return;
      }
      list.innerHTML = items
        .map(
          (c) =>
            `<div class="comment" data-cid="${c.id}"><span class="nick">${escapeHtml(
              c.nick || '匿名'
            )}</span>：${escapeHtml(c.text)}${
              isAdmin
                ? ` <button type="button" class="danger" style="padding:2px 6px;font-size:.75rem;" data-del="${c.id}">删</button>`
                : ''
            }</div>`
        )
        .join('');
      list.querySelectorAll('button[data-del]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const pwd = prompt('管理员密码：');
          if (!pwd) return;
          const cid = btn.getAttribute('data-del');
          const res = await fetchJson(
            '/api/comments/' + encodeURIComponent(cid) + '?pwd=' + encodeURIComponent(pwd),
            { method: 'DELETE' }
          );
          if (res.code === 200) await loadComments(photoId);
          else alert(res.msg || '删除失败');
        });
      });
    }

    document.getElementById('btnPostComment').addEventListener('click', async () => {
      const text = document.getElementById('commentText').value.trim();
      const nick = document.getElementById('commentNick').value.trim();
      if (!currentPhotoId || !text) {
        alert('请填写留言');
        return;
      }
      const res = await fetchJson('/api/comments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ photoId: currentPhotoId, nick, text }),
      });
      if (res.code === 200) {
        document.getElementById('commentText').value = '';
        await loadComments(currentPhotoId);
      } else alert(res.msg || '发表失败');
    });

    document.getElementById('btnNewAlbum').addEventListener('click', () => {
      document.getElementById('modalAlbum').classList.add('show');
      document.getElementById('newAlbumName').value = '';
    });
    document.getElementById('btnCloseAlbum').addEventListener('click', () => {
      document.getElementById('modalAlbum').classList.remove('show');
    });
    document.getElementById('btnCreateAlbum').addEventListener('click', async () => {
      const name = document.getElementById('newAlbumName').value.trim();
      if (!name) return alert('请输入名称');
      const res = await fetchJson('/api/albums', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      if (res.code === 200) {
        document.getElementById('modalAlbum').classList.remove('show');
        await loadAlbums();
        if (res.data && res.data.id) await selectAlbum(res.data.id, res.data.name);
        log('专辑已创建', 'success');
      } else alert(res.msg || '创建失败');
    });

    document.getElementById('btnUpload').addEventListener('click', () => {
      document.getElementById('uploadPanel').style.display = 'block';
    });
    document.getElementById('btnCancelUpload').addEventListener('click', () => {
      document.getElementById('uploadPanel').style.display = 'none';
    });

    document.getElementById('btnDoUpload').addEventListener('click', async () => {
      const albumId = currentAlbumId;
      const fileInput = document.getElementById('uploadFile');
      if (!albumId) return log('请先选择专辑', 'error');
      if (!fileInput.files.length) return log('请选择照片文件', 'error');
      const file = fileInput.files[0];
      if (file.size > 5 * 1024 * 1024) return log('文件超过 5MB', 'error');
      const formData = new FormData();
      formData.append('photo', file);
      formData.append('albumId', albumId);
      log('正在上传…', '');
      try {
        const res = await fetch(API_BASE + '/api/photos', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.code === 200) {
          log('上传成功', 'success');
          document.getElementById('uploadPanel').style.display = 'none';
          fileInput.value = '';
          await loadAlbums();
          await loadPhotos(albumId);
        } else log(data.msg || '上传失败', 'error');
      } catch (e) {
        log('上传失败：' + e.message, 'error');
      }
    });

    document.getElementById('btnAdmin').addEventListener('click', () => {
      document.getElementById('modalAdmin').classList.add('show');
    });
    document.getElementById('btnCloseAdmin').addEventListener('click', () => {
      document.getElementById('modalAdmin').classList.remove('show');
    });
    document.getElementById('btnVerifyAdmin').addEventListener('click', async () => {
      const pwd = document.getElementById('adminPwd').value;
      const res = await fetchJson('/api/verify-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pwd }),
      });
      if (res.code === 200) {
        isAdmin = true;
        document.getElementById('modalAdmin').classList.remove('show');
        log('管理员已登录，可删除内容', 'success');
        if (currentAlbumId) await loadPhotos(currentAlbumId);
      } else alert(res.msg || '密码错误');
    });

    document.getElementById('btnClosePhoto').addEventListener('click', () => {
      document.getElementById('modalPhoto').classList.remove('show');
    });
    document.getElementById('btnDeletePhoto').addEventListener('click', () => {
      if (currentPhotoId) deletePhoto(currentPhotoId);
    });

    (async function init() {
      try {
        const health = await fetchJson('/api/health');
        if (health.code !== 200 || health.initError) {
          log('服务状态异常：' + (health.initError || JSON.stringify(health)), 'error');
        }
        await loadAlbums();
      } catch (e) {
        log('无法连接后端（请检查 Vercel KV 与路由）：' + e.message, 'error');
      }
    })();
  </script>
</body>
</html>
