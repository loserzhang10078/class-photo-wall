<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级照片留言墙（应数251共享版）</title>
<style>
  :root{
    --bg:#f4f6f8;
    --surface:#ffffff;
    --surface-soft:#f8f9fa;
    --border:#e1e4e8;
    --primary:#409eff;
    --danger:#ff4d4f;
    --text:#222;
    --muted:#666;
    --radius:14px;
    --shadow:0 3px 15px rgba(0,0,0,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial}
  html{background:linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);color:var(--text);scroll-behavior:smooth;}
  body{background:var(--bg);min-height:100vh;padding:20px;max-width:1080px;margin:0 auto;position:relative;padding-bottom:180px;}
  button,select,input{font:inherit}

  .top-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:18px;flex-wrap:wrap;background:var(--surface);border-radius:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
  .identity-area,.admin-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .identity-label{font-size:14px;color:var(--muted);min-width:56px;white-space:nowrap;}
  .identity-input,.admin-pwd-input,.album-select-mini,.modal-input,.comment-input,.file-text{width:100%;min-width:160px;background:var(--surface-soft);}
  .identity-input,.admin-pwd-input,.album-select-mini,.modal-input,.comment-input{padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;transition:all .2s;}
  .identity-input:focus,.admin-pwd-input:focus,.album-select-mini:focus,.modal-input:focus,.comment-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(64,158,255,0.12);}
  .admin-btn,.create-album-mini,.upload-toggle,.upload-btn-mini,.modal-btn.confirm,.modal-btn.cancel,.comment-submit,.photo-del-btn{cursor:pointer;transition:all .2s;}
  .admin-btn{padding:12px 16px;border:none;border-radius:12px;background:var(--danger);color:white;font-size:14px;}
  .admin-tips{font-size:13px;color:var(--muted);}

  .log-box{margin:16px 0;padding:16px;border-radius:18px;background:var(--surface-soft);border:1px solid var(--border);font-size:13px;color:#333;min-height:72px;max-height:180px;overflow-y:auto;line-height:1.6;}
  .log-success{color:#67c23a}
  .log-error{color:#f56c6c}
  .log-info{color:var(--primary)}

  .header{text-align:center;margin-bottom:20px}
  .header h1{font-size:28px;color:var(--text);line-height:1.2;}
  .header p{color:var(--muted);margin-top:8px;font-size:15px;}

  .album-wrap{margin-bottom:24px;}
  .album-title{font-size:16px;color:var(--text);margin-bottom:14px;font-weight:600;padding-left:4px;}
  .album-scroll{display:flex;overflow-x:auto;gap:16px;padding-bottom:8px;scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
  .album-scroll::-webkit-scrollbar{height:8px;}
  .album-scroll::-webkit-scrollbar-thumb{background:rgba(64,158,255,0.25);border-radius:999px;}
  .album-card{width:110px;flex-shrink:0;cursor:pointer;transition:transform .2s,box-shadow .2s;border-radius:18px;background:var(--surface);border:1px solid transparent;padding:12px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.04);}
  .album-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08);}
  .album-card.active{border-color:var(--primary);box-shadow:0 10px 30px rgba(64,158,255,0.12);}
  .album-cover{width:100%;height:110px;border-radius:18px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:8px;background:#f5f5f5;}
  .album-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;}

  .album-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px;padding:10px 0;margin-bottom:20px;}
  .album-photo{width:100%;aspect-ratio:1 / 1;border-radius:18px;object-fit:cover;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.06);transition:transform .2s,opacity .2s;background:#f5f5f5;}
  .album-photo:hover{transform:scale(1.03);}
  .photo-empty{width:100%;text-align:center;padding:30px 0;color:#999;font-size:15px;}

  .photo-viewer{background:var(--surface);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;padding:0;display:none;}
  .photo-preview{position:relative;}
  .photo-preview img{width:100%;height:auto;max-height:620px;object-fit:contain;background:#f5f5f5;}
  .viewer-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;border-radius:50%;background:rgba(0,0,0,0.5);color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.15);}
  .viewer-meta{padding:18px 20px;}
  .hot-comment{padding:16px 18px;background:#e8f3ff;border-left:4px solid var(--primary);border-radius:16px;margin:10px 0;}
  .hot-comment h4{color:var(--primary);font-size:15px;margin-bottom:8px;}
  .hot-comment .text{font-size:15px;color:var(--text);line-height:1.7;}
  .hot-comment .name{font-size:13px;color:var(--muted);margin-top:8px;}
  .photo-op-bar{padding:0 0 16px 0;margin:0;display:flex;justify-content:flex-end;}
  .photo-del-btn{background:var(--danger);color:white;border:none;padding:10px 14px;border-radius:12px;font-size:14px;}
  .comment-area{padding:0 0 18px 0;}
  .comment-input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:16px;margin-bottom:12px;font-size:15px;background:var(--surface-soft);}
  .comment-submit{width:100%;padding:12px 16px;border:none;border-radius:14px;background:var(--primary);color:white;font-size:15px;}
  .comment-list{max-height:280px;overflow-y:auto;padding-right:6px;}
  .comment{padding:14px 0;border-bottom:1px solid #f0f2f5;position:relative;}
  .comment .name{color:var(--primary);font-weight:600;}
  .comment .time{font-size:12px;color:var(--muted);margin-left:8px;}
  .comment .text{margin-top:8px;font-size:14px;line-height:1.7;color:#333;}
  .del-cmt{position:absolute;right:0;top:12px;background:var(--danger);color:white;border:none;border-radius:6px;font-size:12px;padding:4px 8px;cursor:pointer;}

  .upload-wrap{position:fixed;bottom:0;left:0;width:100%;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -8px 24px rgba(0,0,0,0.08);z-index:99;padding:14px 16px;}
  .upload-toggle{width:100%;padding:14px;border:1px solid var(--primary);border-radius:14px;background:white;color:var(--primary);font-size:15px;}
  .upload-content{display:none;gap:12px;flex-wrap:wrap;align-items:center;margin-top:10px;}
  .upload-content.show{display:flex;}
  .album-control{flex:1;min-width:180px;display:flex;gap:10px;}
  .album-select-mini{flex:1;padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:var(--surface-soft);}
  .create-album-mini{padding:12px 16px;border:none;border-radius:12px;background:var(--primary);color:white;font-size:14px;}
  .file-wrap{flex:1;min-width:190px;position:relative;}
  .file-input-mini{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;}
  .file-text{display:block;padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;color:#666;background:var(--surface-soft);}
  .upload-btn-mini{flex:none;padding:12px 22px;border:none;border-radius:14px;background:var(--primary);color:white;font-size:14px;}

  .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:100;display:none;justify-content:center;align-items:center;padding:20px;}
  .modal-content{background:white;border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:0 18px 50px rgba(0,0,0,0.12);}
  .modal-title{font-size:18px;margin-bottom:18px;text-align:center;}
  .modal-input{width:100%;padding:14px;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;font-size:15px;background:var(--surface-soft);}
  .modal-btn-group{display:flex;gap:12px;}
  .modal-btn{flex:1;padding:12px 0;border:none;border-radius:14px;font-size:15px;}
  .modal-btn.confirm{background:var(--primary);color:white;}
  .modal-btn.cancel{background:#f5f5f5;color:#666;}

  @media (max-width: 760px) {
    body{padding:16px 12px 180px;}
    .top-bar{flex-direction:column;align-items:stretch;}
    .album-scroll{gap:12px;}
    .album-card{width:calc(33.33% - 10px);}
    .photo-viewer{border-radius:18px;}
    .viewer-close{top:12px;right:12px;width:34px;height:34px;}
    .upload-wrap{padding:12px;}
    .album-control{flex-direction:column;}
    .file-wrap{width:100%;}
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="identity-area">
    <span class="identity-label">你的身份：</span>
    <input type="text" id="commentIdentity" class="identity-input" placeholder="输入昵称（评论用）">
  </div>
  <div class="admin-area">
    <input type="password" id="adminPwd" class="admin-pwd-input" placeholder="管理员密码">
    <button class="admin-btn" onclick="verifyAdmin()">验证</button>
    <span class="admin-tips" id="adminStatus">未验证</span>
  </div>
</div>

<div class="log-box" id="uploadLog">
  [系统] 正在连接服务器...
</div>

<div class="header">
  <h1>班级照片留言墙（应数251共享版）</h1>
  <p>所有人上传的照片/评论都能共享</p>
</div>

<div class="album-wrap">
  <div class="album-title">人物专辑栏</div>
  <div class="album-scroll" id="albumScroll"></div>
</div>

<div class="album-photos" id="albumPhotos">
  <div class="photo-empty">请先选择上方的人物专辑～</div>
</div>

<div class="photo-viewer" id="viewer">
  <div class="photo-preview">
    <button class="viewer-close" onclick="closeViewer()" aria-label="关闭大图">×</button>
    <img id="bigImg" src="">
  </div>
  <div id="hotArea"></div>
  <div class="photo-op-bar" id="photoOpBar">
    <button class="photo-del-btn" onclick="deletePhoto()">🗑️ 删除照片</button>
  </div>
  <div class="comment-area">
    <input class="comment-input" id="msgInput" placeholder="说点什么...">
    <button class="comment-submit" onclick="sendComment()">提交评论</button>
    <div class="comment-list" id="commentList"></div>
  </div>
</div>

<div class="modal" id="createAlbumModal">
  <div class="modal-content">
    <div class="modal-title">创建新专辑</div>
    <input type="text" id="albumNameInput" class="modal-input" placeholder="输入专辑名称（如：三年级二班）">
    <div class="modal-btn-group">
      <button class="modal-btn confirm" onclick="confirmCreateAlbum()">确定</button>
      <button class="modal-btn cancel" onclick="closeCreateAlbumModal()">取消</button>
    </div>
  </div>
</div>

<div class="upload-wrap">
  <button class="upload-toggle" onclick="toggleUpload()">
    📤 上传照片
  </button>
  
  <div class="upload-content" id="uploadContent">
    <div class="album-control">
      <select id="albumSelect" class="album-select-mini">
        <option value="">请选择专辑</option>
      </select>
      <button class="create-album-mini" onclick="openCreateAlbumModal()">新建</button>
    </div>
    
    <div class="file-wrap">
      <span class="file-text" id="fileText">📁 选择照片文件</span>
      <input id="uploadFile" type="file" accept="image/*" class="file-input-mini" onchange="updateFileText()">
    </div>
    
    <button class="upload-btn-mini" onclick="uploadPhoto()">上传</button>
  </div>
</div>

<script>
// 核心修复：强制使用当前域名的绝对路径，避免路径错误
const API_BASE = window.location.origin;
let currentAlbumId = '';
let currentPhotoId = '';
let isAdminVerified = false;

// 日志打印，增加错误提示
function log(message, type = 'info') {
  const logBox = document.getElementById('uploadLog');
  const time = new Date().toLocaleTimeString();
  const className = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-info';
  const logHtml = `<div class="${className}">[${time}] ${message}</div>`;
  logBox.innerHTML = logHtml + logBox.innerHTML.split('<div').slice(0, 10).join('<div');
  console[type === 'error' ? 'error' : 'log'](`[${time}] ${message}`);
}

// 封装请求，增加超时处理
async function request(url, options = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000); // 10秒超时
  try {
    const response = await fetch(`${API_BASE}${url}`, {
      headers: { 'Content-Type': 'application/json', ...options.headers },
      signal: controller.signal,
      ...options
    });
    clearTimeout(timeout);
    return await response.json();
  } catch (err) {
    clearTimeout(timeout);
    if (err.name === 'AbortError') {
      log('请求超时，服务器响应慢', 'error');
    } else {
      log(`网络错误：${err.message}`, 'error');
    }
    return { code: 500, msg: '网络错误' };
  }
}

// 管理员验证
async function verifyAdmin() {
  const pwd = document.getElementById('adminPwd').value;
  const res = await request('/api/verify-admin', {
    method: 'POST', body: JSON.stringify({ pwd })
  });
  if (res.code === 200) {
    isAdminVerified = true;
    document.getElementById('adminStatus').innerText = '已验证';
    document.getElementById('adminStatus').style.color = '#67c23a';
    log('管理员验证成功', 'success');
  } else {
    isAdminVerified = false;
    document.getElementById('adminStatus').innerText = '验证失败';
    document.getElementById('adminStatus').style.color = '#f56c6c';
    log(res.msg, 'error');
  }
}

// 上传区展开/收起
function toggleUpload() {
  const content = document.getElementById('uploadContent');
  content.classList.toggle('show');
  if (content.classList.contains('show')) {
    setTimeout(loadAlbums, 100);
  }
}

// 更新文件选择框文字
function updateFileText() {
  const fileInput = document.getElementById('uploadFile');
  const fileText = document.getElementById('fileText');
  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    fileText.innerText = `📁 ${file.name} (${(file.size/1024).toFixed(1)}KB)`;
  } else {
    fileText.innerText = '📁 选择照片文件';
  }
}

// 加载专辑列表
async function loadAlbums() {
  log('正在加载专辑列表...', 'info');
  const res = await request('/api/albums');
  if (res.code === 200) {
    renderAlbums(res.data);
    updateAlbumSelect(res.data);
    log(`加载成功，共${res.data.length}个专辑`, 'success');
  } else {
    log('加载专辑失败', 'error');
  }
}

// 渲染专辑列表，修复图片加载失败的默认占位
function renderAlbums(albums) {
  const albumScroll = document.getElementById('albumScroll');
  if (albums.length === 0) {
    albumScroll.innerHTML = '<div class="photo-empty">暂无专辑，点击新建创建第一个专辑</div>';
    return;
  }
  // 核心修复：图片加载失败时，用默认占位图
  const defaultCover = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="110" height="110" viewBox="0 0 24 24" fill="%23e8f3ff"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>';
  
  albumScroll.innerHTML = albums.map(album => `
    <div class="album-card ${album.id === currentAlbumId ? 'active' : ''}" onclick="selectAlbum('${album.id}')">
      <img class="album-cover" loading="lazy" src="${album.coverUrl || defaultCover}" onerror="this.src='${defaultCover}'">
      <div class="album-name">${album.name}</div>
    </div>
  `).join('');
}

// 更新专辑下拉框
function updateAlbumSelect(albums) {
  const albumSelect = document.getElementById('albumSelect');
  albumSelect.innerHTML = '<option value="">请选择专辑</option>';
  albums.forEach(album => {
    const opt = document.createElement('option');
    opt.value = album.id;
    opt.innerText = album.name;
    albumSelect.appendChild(opt);
  });
  if (currentAlbumId) albumSelect.value = currentAlbumId;
}

// 选择专辑
async function selectAlbum(albumId) {
  currentAlbumId = albumId;
  await loadAlbums();
  await loadPhotos(albumId);
}

// 加载专辑下的照片，修复图片路径
async function loadPhotos(albumId) {
  log('正在加载照片...', 'info');
  const res = await request(`/api/photos/${albumId}`);
  const albumPhotos = document.getElementById('albumPhotos');
  const defaultImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="110" height="110" viewBox="0 0 24 24" fill="%23f5f5f5"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>';
  
  if (res.code === 200 && res.data.length > 0) {
    albumPhotos.innerHTML = res.data.map(photo => {
      // 核心修复：强制拼接完整的图片地址
      const imgUrl = `${API_BASE}${photo.url}`;
      return `<img class="album-photo" loading="lazy" src="${imgUrl}" onerror="this.src='${defaultImg}'" onclick="openPhoto('${photo.id}')">`;
    }).join('');
    log(`加载成功，共${res.data.length}张照片`, 'success');
  } else {
    albumPhotos.innerHTML = '<div class="photo-empty">该专辑暂无照片，点击底部上传照片</div>';
  }
}

// 打开照片详情，修复大图路径
async function openPhoto(photoId) {
  currentPhotoId = photoId;
  const res = await request(`/api/comments/${photoId}`);
  const comments = res.data || [];
  const albumRes = await request(`/api/photos/${currentAlbumId}`);
  const photo = albumRes.data.find(p => p.id === photoId);
  const defaultImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="%23f5f5f5"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>';
  
  document.getElementById('viewer').style.display = 'block';
  // 核心修复：大图地址用完整路径
  const bigImg = document.getElementById('bigImg');
  bigImg.src = photo ? `${API_BASE}${photo.url}` : defaultImg;
  bigImg.onerror = () => bigImg.src = defaultImg;
  
  const hotArea = document.getElementById('hotArea');
  if (comments.length > 0) {
    const c = comments[0];
    hotArea.innerHTML = `
      <div class="hot-comment">
        <h4>💬 最新留言</h4>
        <div class="text">${c.text}</div>
        <div class="name">${c.nick || '匿名'}</div>
      </div>
    `;
  } else {
    hotArea.innerHTML = '<div class="hot-comment"><h4>💬 暂无留言</h4></div>';
  }
  
  const commentList = document.getElementById('commentList');
  commentList.innerHTML = comments.map((c, i) => `
    <div class="comment">
      <span class="name">${c.nick || '匿名'}</span>
      <div class="text">${c.text}</div>
      ${isAdminVerified ? `<button class="del-cmt" onclick="deleteComment('${c.id}')">删</button>` : ''}
    </div>
  `).join('');
  
  document.getElementById('photoOpBar').style.display = isAdminVerified ? 'flex' : 'none';
}

// 专辑弹窗
function openCreateAlbumModal() { document.getElementById('createAlbumModal').style.display = 'flex'; }
function closeCreateAlbumModal() { document.getElementById('createAlbumModal').style.display = 'none'; }
function closeViewer() { document.getElementById('viewer').style.display = 'none'; }

// 创建专辑
async function confirmCreateAlbum() {
  const name = document.getElementById('albumNameInput').value.trim();
  if (!name) {
    log('请输入专辑名称', 'error');
    return;
  }
  const res = await request('/api/albums', {
    method: 'POST', body: JSON.stringify({ name })
  });
  if (res.code === 200) {
    closeCreateAlbumModal();
    await loadAlbums();
    log(`创建专辑「${name}」成功`, 'success');
  } else {
    log(`创建失败：${res.msg}`, 'error');
  }
}

// 上传照片
async function uploadPhoto() {
  const albumId = document.getElementById('albumSelect').value;
  const fileInput = document.getElementById('uploadFile');
  if (!albumId || !fileInput.files.length) {
    log('请选择专辑和照片', 'error');
    return;
  }
  const formData = new FormData();
  formData.append('photo', fileInput.files[0]);
  formData.append('albumId', albumId);
  
  log('正在上传照片...', 'info');
  try {
    const res = await fetch(`${API_BASE}/api/photos`, { 
      method: 'POST', 
      body: formData,
      signal: AbortSignal.timeout(30000) // 30秒超时，上传大图片给足够时间
    });
    const data = await res.json();
    if (data.code === 200) {
      log('上传成功', 'success');
      await loadAlbums();
      await loadPhotos(albumId);
      // 重置上传区
      document.getElementById('uploadContent').classList.remove('show');
      fileInput.value = '';
      document.getElementById('fileText').innerText = '📁 选择照片文件';
    } else {
      log(`上传失败：${data.msg}`, 'error');
    }
  } catch (err) {
    log(`上传失败：${err.message}`, 'error');
  }
}

// 删除照片
async function deletePhoto() {
  if (!isAdminVerified) {
    log('请先验证管理员', 'error');
    return;
  }
  if (!confirm('确定删除这张照片吗？')) return;
  const pwd = document.getElementById('adminPwd').value;
  const res = await request(`/api/photos/${currentPhotoId}?pwd=${pwd}`, { method: 'DELETE' });
  if (res.code === 200) {
    document.getElementById('viewer').style.display = 'none';
    await loadPhotos(currentAlbumId);
    log('删除成功', 'success');
  } else {
    log(`删除失败：${res.msg}`, 'error');
  }
}

// 提交评论
async function sendComment() {
  const text = document.getElementById('msgInput').value.trim();
  const nick = document.getElementById('commentIdentity').value.trim() || '匿名';
  if (!text || !currentPhotoId) {
    log('请输入评论内容', 'error');
    return;
  }
  const res = await request('/api/comments', {
    method: 'POST', body: JSON.stringify({ photoId: currentPhotoId, nick, text })
  });
  if (res.code === 200) {
    await openPhoto(currentPhotoId);
    document.getElementById('msgInput').value = '';
    log('评论成功', 'success');
  } else {
    log(`评论失败：${res.msg}`, 'error');
  }
}

// 删除评论
async function deleteComment(commentId) {
  if (!isAdminVerified) return;
  const pwd = document.getElementById('adminPwd').value;
  await request(`/api/comments/${commentId}?pwd=${pwd}`, { method: 'DELETE' });
  await openPhoto(currentPhotoId);
}

// 页面加载完成后初始化
window.onload = () => {
  log('页面加载完成，正在连接服务器...', 'info');
  loadAlbums();
};
</script>
